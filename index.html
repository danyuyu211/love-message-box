<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>给你的心动留言</title>
<style>
/* ========== 横屏提示遮罩 ========== */
#landscape-overlay {
  display: none;
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
  z-index: 99999;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
}
#landscape-overlay .rotate-icon { font-size: 64px; margin-bottom: 20px; animation: heartbeat 0.8s ease-in-out infinite; }
#landscape-overlay .rotate-text { font-size: 20px; font-weight: bold; color: #d63384; }

@media (orientation: landscape) and (max-width: 768px) {
  #landscape-overlay { display: flex; }
  #loading-overlay,
  #qa-page,
  #heart-page,
  #sticker-overlay,
  #dislike-hint,
  #particles-canvas,
  #clear-btn,
  #heart-counter { display: none !important; }
}

/* ========== 全局重置 ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: auto;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  touch-action: manipulation;
}

/* ========== 加载动画 ========== */
#loading-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10000;
  transition: opacity 400ms ease;
}
#loading-overlay.hidden { opacity: 0; pointer-events: none; }

.loading-heart {
  position: relative;
  width: 70px; height: 65px;
  animation: heartbeat 0.6s ease-in-out infinite;
}
.loading-heart::before,
.loading-heart::after {
  content: '';
  position: absolute; top: 0;
  width: 38px; height: 58px;
  border-radius: 30px 30px 0 0;
  background: #ff6b8a;
}
.loading-heart::before { left: 38px; transform: rotate(-45deg); transform-origin: 0 100%; }
.loading-heart::after  { left: 0;    transform: rotate(45deg);  transform-origin: 100% 100%; }
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.22); }
  30% { transform: scale(1); }
  45% { transform: scale(1.12); }
  60% { transform: scale(1); }
}

#loading-progress {
  width: 160px; height: 6px; margin-top: 32px;
  background: rgba(255,182,193,0.4); border-radius: 10px; overflow: hidden;
}
#loading-progress-fill {
  width: 0%; height: 100%;
  background: linear-gradient(90deg, #ffb6c1, #ff6b8a);
  border-radius: 10px; transition: width 80ms linear;
}

/* ========== 背景飘落粒子画布 ========== */
#particles-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 11; pointer-events: none;
}

/* ========== 按钮通用 ========== */
button {
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none; user-select: none;
  transition: transform 100ms ease, box-shadow 100ms ease, filter 100ms ease;
  border: none; outline: none; cursor: pointer;
  position: relative; overflow: hidden;
}
button:active { transform: scale(0.95); filter: brightness(1.12); }
button .ripple {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.45);
  transform: scale(0);
  animation: rippleAnim 500ms ease-out forwards;
  pointer-events: none;
}
@keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

/* ========== 页面容器 ========== */
.page {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  transition: opacity 300ms ease;
}

/* ========== 第一页：问答界面 ========== */
#qa-page {
  background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
}
#qa-page.hidden { opacity: 0; pointer-events: none; }

#qa-card {
  position: relative; width: 85vw; max-width: 360px; background: #fff;
  border-radius: 20px; box-shadow: 0 10px 30px rgba(214, 51, 132, 0.15);
  padding: 40px 20px 30px 20px; text-align: center; overflow: visible; z-index: 1;
}
#qa-card::before {
  content: ''; position: absolute;
  top: -3px; left: -3px; right: -3px; bottom: -3px; border-radius: 23px;
  background: linear-gradient(45deg, #ffb6c1, #ff69b4, #ffb6c1, #ff1493, #ffb6c1);
  background-size: 400% 400%; z-index: -1;
  animation: borderFlow 3s ease 1 forwards;
}
@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

#qa-question {
  font-size: 26px; font-weight: bold;
  background: linear-gradient(135deg, #c2185b, #d63384, #c2185b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 30px;
  filter: drop-shadow(0 0 6px rgba(255,105,180,0.4));
}

#qa-buttons { display: flex; justify-content: center; gap: 30px; height: 48px; }

.btn-like, .btn-dislike {
  width: 110px; height: 48px; border-radius: 12px;
  font-size: 16px; font-weight: bold; flex-shrink: 0;
}
.btn-like { background: #e91e63; color: #fff; }
.btn-dislike { background: #c4a0a8; color: #fff; }
.btn-dislike.moving {
  position: fixed; z-index: 100; transition: left 200ms ease, top 200ms ease;
}

/* 不喜欢提示浮层 */
#dislike-hint {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 200; background: rgba(255,255,255,0.94); color: #c0395b;
  box-shadow: 0 4px 20px rgba(180,60,80,0.25);
  box-shadow: 0 4px 20px rgba(180,60,80,0.25);
  padding: 12px 24px; border-radius: 20px; font-size: 16px; font-weight: bold;
  opacity: 0; pointer-events: none; transition: opacity 300ms ease; white-space: nowrap;
}
#dislike-hint.show { opacity: 1; }

/* ========== 贴纸弹窗 ========== */
#sticker-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.6);
  display: flex; align-items: center; justify-content: center; padding-bottom: 18vh;
  z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 200ms ease;
}
#sticker-overlay.show { opacity: 1; pointer-events: auto; }
#sticker-content { display: flex; flex-direction: column; align-items: center; }
#sticker-overlay img {
  width: 100%; max-width: 300px; height: auto; object-fit: contain;
  transition: transform 100ms ease;
}
#sticker-overlay:active img { transform: scale(0.95); }
#sticker-text {
  display: inline-block; font-size: 16px; font-weight: bold; color: #d63384;
  margin-top: 24px; text-align: center; background: rgba(255,255,255,0.88);
  padding: 10px 22px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* ========== 第二页：爱心卡片界面 ========== */
#heart-page {
  background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
  z-index: 5; opacity: 0; pointer-events: none;
}
#heart-page.show { opacity: 1; pointer-events: auto; }

#clear-btn {
  position: fixed; top: 20px; right: 20px; z-index: 9999;
  background: #fff; color: #dc3545; border-radius: 12px; padding: 10px 18px;
  font-size: 14px; font-weight: bold; box-shadow: 0 4px 12px rgba(220, 53, 69, 0.2);
}

#heart-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
}

/* 缩小后的爱心小框 */
.heart-card {
  position: absolute;
  width: 90px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: bold; opacity: 1;
  transition: left 400ms ease, top 400ms ease, transform 400ms ease, opacity 350ms ease, filter 400ms ease;
  pointer-events: none;
  overflow: hidden; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none;
}
.heart-card.appear {
  animation: cardAppear 200ms ease forwards;
}
.heart-card.fading { opacity: 0; }
.heart-card.dimmed { opacity: 0.25; }

/* 随机阶段的卡片可点击 */
.heart-card.random-card {
  pointer-events: auto;
}

@keyframes cardAppear {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
}

/* 桌面端卡片放大 */
@media (min-width: 769px) {
  .heart-card {
    width: 120px; height: 46px; border-radius: 10px;
    font-size: 16px;
  }
}

/* 随机生成弹窗动画 */
@keyframes popIn {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
  60% { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
.heart-card.pop-in {
  animation: popIn 350ms ease-out forwards;
}

.heart-card.shaking {
  animation: shake 300ms ease-in-out infinite;
}
@keyframes shake {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  25% { transform: translate(-52%, -48%) scale(1.03); }
  50% { transform: translate(-48%, -52%) scale(1.03); }
  75% { transform: translate(-52%, -50%) scale(1.03); }
}

.card-particle {
  position: fixed; pointer-events: none; font-size: 14px; z-index: 10001;
  animation: particleFly 700ms ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0.3); }
}

#clear-message {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 20; opacity: 0; pointer-events: none; transition: opacity 300ms ease;
}
#clear-message.show { opacity: 1; pointer-events: auto; }
#clear-message .msg-main {
  font-size: 22px; font-weight: bold;
  background: linear-gradient(135deg, #ff69b4, #d63384);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 12px;
}
#clear-message .msg-sub { font-size: 14px; color: #666; }
</style>
</head>

    "多喝水呀", "我想你了", "你笑起来最好看", "我会一直陪着你", "开心每一天"
  ];

  var dislikeHints = [
    "再好好想想～",
    "不许拒绝我哦",
    "真的不考虑一下吗",
    "最后一次机会啦 呜呜"
  ];

  // 多色调色板
  var cardColors = [
    { bg: 'linear-gradient(135deg, #ffb6c1, #ff9ab5)', hue: 'pink' },
    { bg: 'linear-gradient(135deg, #d4b8d4, #c9a0dc)', hue: 'purple' },
    { bg: 'linear-gradient(135deg, #ffeaa7, #fdcb6e)', hue: 'yellow' },
    { bg: 'linear-gradient(135deg, #aec8e8, #81b0dc)', hue: 'blue' },
    { bg: 'linear-gradient(135deg, #ffd1dc, #ffb3c6)', hue: 'pink2' },
    { bg: 'linear-gradient(135deg, #e8d5e0, #d4b8cc)', hue: 'purple2' },
    { bg: 'linear-gradient(135deg, #fce4c8, #f8d5a3)', hue: 'yellow2' },
    { bg: 'linear-gradient(135deg, #c5d5f2, #a3c4e8)', hue: 'blue2' }
  ];

  function getCardColor(lastHue) {
    var available = cardColors.filter(function(c) { return c.hue !== lastHue; });
    if (available.length === 0) available = cardColors;
    return available[Math.floor(Math.random() * available.length)];
  }

  function canClick(gap) {
    gap = gap || 300;
    var now = Date.now();
    if (now - lastClickTime < gap) return false;
    lastClickTime = now;
    return true;
  }

  function addRipple(e, btn) {
    var rect = btn.getBoundingClientRect();
    var size = Math.max(rect.width, rect.height);
    var ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
    btn.appendChild(ripple);
    setTimeout(function() { if (ripple.parentNode) ripple.parentNode.removeChild(ripple); }, 500);
  }

  function getLikeRect() {
    var lr = btnLike.getBoundingClientRect();
    return { left: lr.left, top: lr.top, right: lr.right, bottom: lr.bottom, width: lr.width, height: lr.height };
  }

  function getDislikeRect(x, y) {
    return { left: x, top: y, right: x + 110, bottom: y + 48, width: 110, height: 48 };
  }

  function rectsOverlap(r1, r2, margin) {
    margin = margin || 0;
    return !(r1.right + margin <= r2.left || r1.left >= r2.right + margin ||
             r1.bottom + margin <= r2.top || r1.top >= r2.bottom + margin);
  }

  function randomDislikePos() {
    var sw = window.innerWidth;
    var sh = window.innerHeight;
    var safeMargin = 5;
    var minX = safeMargin;
    var maxX = sw - 110 - safeMargin;
    var minY = sh * 0.27;
    var maxY = sh * 0.78 - 48;
    if (maxY < minY) { maxY = minY; }
    var lr = getLikeRect(); likeRect = lr;
    var questionEl = document.getElementById('qa-question');
    var qr = questionEl.getBoundingClientRect();
    var safeDist = 60;
    var textMargin = 15;
    var maxAttempts = 2000;
    for (var i = 0; i < maxAttempts; i++) {
      var x = minX + Math.random() * (maxX - minX);
      var y = minY + Math.random() * (maxY - minY);
      var dr = getDislikeRect(x, y);
      if (!rectsOverlap(dr, lr, safeDist) && !rectsOverlap(dr, qr, textMargin)) {
        return { left: x, top: y };
      }
    }
    var fallbackX = Math.max(minX, Math.max(lr.right, qr.right) + safeDist);
    if (fallbackX + 110 < sw - safeMargin) {
      return { left: fallbackX, top: minY + (maxY - minY) / 2 };
    }
    return { left: minX + (maxX - minX) / 2, top: minY + (maxY - minY) / 2 };
  }

  function showDislikeHint() {
    if (hintTimer) { clearTimeout(hintTimer); }
    var txt = dislikeHints[dislikeCount - 1] || '';
    dislikeHint.textContent = txt;
    dislikeHint.classList.add('show');
    hintTimer = setTimeout(function() {
      dislikeHint.classList.remove('show');
      hintTimer = null;
    }, 1000);
  }

  // ========== "不喜欢" 按钮 ==========
  btnDislike.addEventListener('click', function(e) {
    e.stopPropagation();
    if (!canClick(350)) return;
    addRipple(e, btnDislike);
    dislikeCount++;
    if (!likeRect) { likeRect = getLikeRect(); }
    if (dislikeCount >= 1 && dislikeCount <= 4) { showDislikeHint(); }
    if (dislikeCount >= 5) {
      if (hintTimer) { clearTimeout(hintTimer); dislikeHint.classList.remove('show'); }
      stickerOverlay.classList.add('show');
      return;
    }
    if (!btnDislike.classList.contains('moving')) {
      var cr = qaCard.getBoundingClientRect();
      var dr = btnDislike.getBoundingClientRect();
      btnDislike.style.transition = 'none';
      btnDislike.style.left = dr.left + 'px';
      btnDislike.style.top = dr.top + 'px';
      btnDislike.classList.add('moving');
      btnDislike.offsetHeight;
      btnDislike.style.transition = '';
      var lr2 = btnLike.getBoundingClientRect();
      btnLike.style.position = 'absolute';
      btnLike.style.left = (lr2.left - cr.left) + 'px';
      btnLike.style.top = (lr2.top - cr.top) + 'px';
      btnLike.style.margin = '0';
    }
    var pos = randomDislikePos();
    btnDislike.style.left = pos.left + 'px';
    btnDislike.style.top = pos.top + 'px';
  });

  // ========== 贴纸弹窗 ==========
  stickerOverlay.addEventListener('click', function() {
    stickerOverlay.classList.remove('show');
    dislikeCount = 0; likeRect = null;
    if (hintTimer) { clearTimeout(hintTimer); dislikeHint.classList.remove('show'); }
    if (btnDislike.classList.contains('moving')) {
      btnDislike.style.transition = 'none';
      btnDislike.classList.remove('moving');
      btnDislike.style.left = ''; btnDislike.style.top = ''; btnDislike.style.transition = '';
      btnLike.style.position = ''; btnLike.style.left = ''; btnLike.style.top = ''; btnLike.style.margin = '';
    }
  });

  // ========== "喜欢" 按钮 ==========
  btnLike.addEventListener('click', function(e) {
    if (!canClick(500)) return;
    addRipple(e, btnLike);
    if (!likeRect) { likeRect = getLikeRect(); }
    qaPage.classList.add('hidden');
    heartPage.classList.add('show');
    setTimeout(generateHeart, 350);
  });

  // ========== 自适应卡片尺寸 ==========
  function getCardSize() {
    var sw = window.innerWidth;
    if (sw >= 769) return { w: 120, h: 46 };
    return { w: 90, h: 36 };
  }

  // ========== 爱心生成（阶段1：组装） ==========
  function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
  function heartY(t) { return 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t); }

  function stopAllTimers() {
    if (genTimer) { clearTimeout(genTimer); genTimer = null; }
    if (phaseTimer) { clearTimeout(phaseTimer); phaseTimer = null; }
    if (randomSpawnTimer) { clearInterval(randomSpawnTimer); randomSpawnTimer = null; }
  }

  function clearAllCardDOM() {
    allCards.forEach(function(c) { if (c.parentNode) c.parentNode.removeChild(c); });
    allCards = [];
    selectedCard = null;
  }

  function generateHeart() {
    stopAllTimers();
    clearAllCardDOM();
    clearMsg.classList.remove('show');
    phase = 'assembling';

    var sw = window.innerWidth;
    var sh = window.innerHeight;
    var scale = Math.min(sw * 0.85, sh * 0.75) / 32;
    var centerX = sw / 2;
    var centerY = sh / 2 - scale * 6;
    var cs = getCardSize();
    var cardWidth = cs.w;
    var spacing = cardWidth / 3;
    var sampleCount = 3000;
    var points = [];
    var prevSx = null, prevSy = null, cumLen = 0;

    for (var i = 0; i <= sampleCount; i++) {
      var t = (i / sampleCount) * 2 * Math.PI;
      var mx = heartX(t);
      var my = heartY(t);
      var sx = centerX + scale * mx;
      var sy = centerY - scale * my;
      if (prevSx !== null) { cumLen += Math.sqrt((sx-prevSx)*(sx-prevSx) + (sy-prevSy)*(sy-prevSy)); }
      points.push({ t: t, mx: mx, my: my, sx: sx, sy: sy, cumLen: cumLen });
      prevSx = sx; prevSy = sy;
    }

    var totalLen = cumLen;
    var cardCount = Math.floor(totalLen / spacing);
    if (cardCount < 1) cardCount = 1;
    if (cardCount > 250) cardCount = 250;

    var cardData = [];
    var lastTextIdx = -1;
    var lastColorHue = null;

    for (var c = 0; c < cardCount; c++) {
      var targetLen = c * spacing;
      var idx = 0;
      for (var j = 0; j < points.length; j++) { if (points[j].cumLen >= targetLen) { idx = j; break; } }
      if (idx === 0) idx = 1;
      if (idx >= points.length) idx = points.length - 1;
      var p0 = points[idx - 1], p1 = points[idx];
      var segLen = p1.cumLen - p0.cumLen;
      var frac = segLen > 0 ? (targetLen - p0.cumLen) / segLen : 0;
      if (frac < 0) frac = 0; if (frac > 1) frac = 1;
      var tt = p0.t + frac * (p1.t - p0.t);
      var mmx = heartX(tt), mmy = heartY(tt);
      var ssx = centerX + scale * mmx, ssy = centerY - scale * mmy;

      var textIdx, attempts = 0;
      do { textIdx = Math.floor(Math.random() * sentences.length); attempts++; if (attempts > 50) break; }
      while (textIdx === lastTextIdx && sentences.length > 1);
      lastTextIdx = textIdx;

      var colorInfo = getCardColor(lastColorHue);
      lastColorHue = colorInfo.hue;

      cardData.push({ sx: ssx, sy: ssy, text: sentences[textIdx], zIndex: c + 1, bg: colorInfo.bg, index: c });
    }

    var genIndex = 0;
    function nextCard() {
      if (genIndex >= cardData.length) {
        genTimer = null;
        phase = 'pause';
        // 阶段2：停顿2秒后进入消失阶段
        phaseTimer = setTimeout(startDisappearing, 1000);
        return;
      }
      if (clearMsg.classList.contains('show')) { genTimer = null; return; }

      var d = cardData[genIndex];
      var card = document.createElement('div');
      card.className = 'heart-card';
      card.style.background = d.bg;
      card.style.left = d.sx + 'px';
      card.style.top = d.sy + 'px';
      card.style.transform = 'translate(-50%, -50%) scale(0.8)';
      card.style.zIndex = d.zIndex;
      card.textContent = d.text;
      card.dataset.cardIndex = d.index;
      card.dataset.origLeft = d.sx;
      card.dataset.origTop = d.sy;
      card.dataset.origZIndex = d.zIndex;

      heartContainer.appendChild(card);
      allCards.push(card);

      requestAnimationFrame(function() {
        card.classList.add('appear');
        card.style.transform = 'translate(-50%, -50%) scale(1)';
      });

      genIndex++;
      genTimer = setTimeout(nextCard, 40);
    }
    nextCard();
  }

  // ========== 阶段3：逐个消失 ==========
  function startDisappearing() {
    if (phase !== 'pause') return;
    phase = 'disappearing';
    var disappearIndex = 0;
    var cardsToRemove = allCards.slice(); // 按生成顺序

    function disappearNext() {
      if (disappearIndex >= cardsToRemove.length) {
        // 全部消失完毕，进入随机生成阶段
        allCards.forEach(function(c) { if (c.parentNode) c.parentNode.removeChild(c); });
        allCards = [];
        selectedCard = null;
        startRandomSpawning();
        return;
      }
      var card = cardsToRemove[disappearIndex];
      if (card && card.parentNode) {
        card.classList.add('fading');
      }
      disappearIndex++;
      phaseTimer = setTimeout(disappearNext, 20);
    }
    disappearNext();
  }

  // ========== 阶段4：随机生成（纯随机，自适应数量） ==========
  var RANDOM_TOTAL = 0;
  var spawnedCount = 0;

  function startRandomSpawning() {
    phase = 'random';
    var sw = window.innerWidth, sh = window.innerHeight;
    if (sw < 769) {
      RANDOM_TOTAL = 150;
    } else {
      var area = sw * sh;
      RANDOM_TOTAL = Math.floor(area / 5000);
      if (RANDOM_TOTAL < 200) RANDOM_TOTAL = 200;
      if (RANDOM_TOTAL > 450) RANDOM_TOTAL = 450;
    }
    spawnedCount = 0;
    spawnBatch();
    randomSpawnTimer = setInterval(spawnBatch, 100);
  }

  function spawnBatch() {
    if (phase !== 'random') return;
    if (spawnedCount >= RANDOM_TOTAL) {
      clearInterval(randomSpawnTimer);
      randomSpawnTimer = null;
      return;
    }
    var batch = 5 + Math.floor(Math.random() * 6);
    for (var i = 0; i < batch; i++) {
      if (spawnedCount >= RANDOM_TOTAL) break;
      createRandomCard();
      spawnedCount++;
    }
  }

  function createRandomCard() {
    var sw = window.innerWidth, sh = window.innerHeight;
    var cs = getCardSize();
    var cardW = cs.w, cardH = cs.h;
    var minX = cardW / 2, maxX = sw - cardW / 2;
    var minY = cardH / 2, maxY = sh - cardH / 2;
    var x = minX + Math.random() * (maxX - minX);
    var y = minY + Math.random() * (maxY - minY);

    var textIdx = Math.floor(Math.random() * sentences.length);
    var colorInfo = cardColors[Math.floor(Math.random() * cardColors.length)];

    var card = document.createElement('div');
    card.className = 'heart-card random-card pop-in';
    card.style.background = colorInfo.bg;
    card.style.left = x + 'px';
    card.style.top = y + 'px';
    card.style.transform = 'translate(-50%, -50%) scale(1)';
    card.style.zIndex = Math.floor(Math.random() * 500 + 100);
    card.textContent = sentences[textIdx];

    heartContainer.appendChild(card);
    allCards.push(card);
  }

  // ========== 卡片点击交互（仅随机阶段） ==========
  function selectCard(card) {
    // 先移除 pop-in 动画，避免动画 fill 阻塞 transform 过渡
    card.classList.remove('pop-in');
    if (!card.dataset.savedLeft) {
      card.dataset.savedLeft = card.style.left;
      card.dataset.savedTop = card.style.top;
      card.dataset.savedTransform = card.style.transform;
      card.dataset.savedZIndex = card.style.zIndex;
    }
    var sw = window.innerWidth, sh = window.innerHeight;
    card.style.willChange = 'transform, left, top';
    card.style.left = (sw / 2) + 'px';
    card.style.top = (sh / 2) + 'px';
    card.style.transform = 'translate(-50%, -50%) scale(2.0)';
    card.style.zIndex = '10000';
    selectedCard = card;

    allCards.forEach(function(c) {
      if (c !== card && !c.classList.contains('fading')) c.classList.add('dimmed');
    });
  }

  function resetCardPosition(card) {
    card.style.willChange = 'auto';
    if (card.dataset.savedLeft) {
      card.style.left = card.dataset.savedLeft;
      card.style.top = card.dataset.savedTop;
      card.style.transform = card.dataset.savedTransform;
      card.style.zIndex = card.dataset.savedZIndex;
      delete card.dataset.savedLeft; delete card.dataset.savedTop;
      delete card.dataset.savedTransform; delete card.dataset.savedZIndex;
    }
    card.classList.remove('dimmed');
    allCards.forEach(function(c) { c.classList.remove('dimmed'); });
  }

  heartContainer.addEventListener('click', function(e) {
    if (phase !== 'random') return;
    var card = e.target;
    if (!card.classList.contains('random-card')) return;
    if (card.classList.contains('fading')) return;
    if (!canClick(300)) return;

    if (card === selectedCard) {
      resetCardPosition(card);
      selectedCard = null;
    } else {
      if (selectedCard) { resetCardPosition(selectedCard); }
      selectCard(card);
    }
  });

  // ========== 长按粒子特效 ==========
  var longPressTimer = null, longPressCard = null;
  heartContainer.addEventListener('touchstart', function(e) {
    var card = e.target;
    if (!card.classList.contains('heart-card')) return;
    if (card.classList.contains('fading')) return;
    longPressCard = card;
    longPressTimer = setTimeout(function() {
      if (longPressCard) { longPressCard.classList.add('shaking'); spawnParticles(longPressCard); }
    }, 500);
  }, { passive: true });
  heartContainer.addEventListener('touchend', function() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    if (longPressCard) { longPressCard.classList.remove('shaking'); longPressCard = null; }
  });
  heartContainer.addEventListener('touchmove', function() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    if (longPressCard) { longPressCard.classList.remove('shaking'); longPressCard = null; }
  });

  function spawnParticles(card) {
    var rect = card.getBoundingClientRect();
    var cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    var emojis = ['💕', '💖', '✨', '💗', '🌸'];
    for (var i = 0; i < 6; i++) {
      var p = document.createElement('span');
      p.className = 'card-particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = cx + 'px'; p.style.top = cy + 'px';
      p.style.setProperty('--px', (Math.random() * 80 - 40) + 'px');
      p.style.setProperty('--py', (Math.random() * -60 - 20) + 'px');
      document.body.appendChild(p);
      setTimeout(function() { if (p.parentNode) p.parentNode.removeChild(p); }, 700);
    }
  }

  // ========== "全部清除" ==========
  clearBtn.addEventListener('click', function(e) {
    if (!canClick(500)) return;
    addRipple(e, clearBtn);
    stopAllTimers();
    if (selectedCard) { resetCardPosition(selectedCard); selectedCard = null; }
    allCards.forEach(function(card) { card.classList.add('fading'); });
    phase = 'idle';
    setTimeout(function() {
      allCards.forEach(function(card) { if (card.parentNode) card.parentNode.removeChild(card); });
      allCards = [];
      clearMsg.classList.add('show');
    }, 350);
  });

  // ========== resize ==========
  var resizeTimeout;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimeout);
    if (heartPage.classList.contains('show') && !clearMsg.classList.contains('show')) {
      resizeTimeout = setTimeout(function() {
        stopAllTimers();
        clearAllCardDOM();
        generateHeart();
      }, 400);
    }
  });

  // ========== 全局禁用 ==========
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  document.addEventListener('dblclick', function(e) { e.preventDefault(); });
  document.addEventListener('selectstart', function(e) { e.preventDefault(); });

  // ========== 背景粒子 ==========
  (function initParticles() {
    var canvas = particlesCanvas, ctx = canvas.getContext('2d');
    var particles = [], MAX = 25;
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    var icons = ['❤️', '💕', '⭐', '✨', '💗', '🌟'];
    function createParticle() {
      return { x: Math.random() * canvas.width, y: -20, size: 8 + Math.random() * 14,
        speed: 0.3 + Math.random() * 0.7, opacity: 0.12 + Math.random() * 0.22,
        drift: (Math.random() - 0.5) * 0.5, text: icons[Math.floor(Math.random() * icons.length)] };
    }
    for (var i = 0; i < MAX; i++) { var p = createParticle(); p.y = Math.random() * canvas.height; particles.push(p); }
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i]; p.y += p.speed; p.x += p.drift;
        if (p.y > canvas.height + 30) { particles[i] = createParticle(); p = particles[i]; }
        if (p.x < -30) p.x = canvas.width + 30; if (p.x > canvas.width + 30) p.x = -30;
        ctx.save(); ctx.globalAlpha = p.opacity;
        ctx.font = p.size + 'px serif'; ctx.fillText(p.text, p.x, p.y); ctx.restore();
      }
      requestAnimationFrame(animate);
    }
    animate();
  })();

  // ========== 加载动画 ==========
  var loadingProgressFill = document.getElementById('loading-progress-fill');
  var loadStart = Date.now(), loadDuration = 1500;
  var loadTimer = setInterval(function() {
    var elapsed = Date.now() - loadStart;
    var pct = Math.min(100, Math.round(elapsed / loadDuration * 100));
    loadingProgressFill.style.width = pct + '%';
    if (elapsed >= loadDuration) { clearInterval(loadTimer); loadingOverlay.classList.add('hidden'); }
  }, 50);

  // ========== 全局按钮波纹 ==========
  document.querySelectorAll('button').forEach(function(btn) {
    btn.addEventListener('pointerdown', function(e) { addRipple(e, btn); });
  });

})();
</script>
